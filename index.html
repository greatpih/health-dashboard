<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>부관 | 건강·약 트렌드 대시보드</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">부관 private dashboard</p>
        <h1>건강·약 트렌드 대시보드</h1>
        <p class="subtext">최신 기사, 쇼츠감, 약 관련 흐름을 카테고리별로 보는 개인용 화면</p>
      </div>
      <div class="status-card">
        <span>운영 소스 4개</span>
        <span>전체 기사 최신순 확인</span>
        <span>쇼츠감 분리 보기</span>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <section class="panel">
          <h2>빠른 필터</h2>
          <div class="filter-group" id="sourceFilters"></div>
          <div class="filter-group" id="tagFilters"></div>
          <label class="checkbox-row">
            <input type="checkbox" id="shortsOnly" />
            <span>쇼츠감 8점 이상만 보기</span>
          </label>
        </section>

        <section class="panel">
          <h2>탐색 기준</h2>
          <ul>
            <li>최신기사, 쇼츠감, 약 관련 기사 중심</li>
            <li>전체 기사 노출, 추천은 별도 표시</li>
            <li>원문 전체 복제 없이 링크 중심</li>
          </ul>
        </section>
      </aside>

      <section class="content">
        <section class="hero panel">
          <div>
            <h2>카테고리로 보기</h2>
            <p>전체를 보되, 대장님이 찾기 쉬운 방식으로 묶어둠</p>
          </div>
          <div class="sort-row">
            <label for="sortSelect">정렬</label>
            <select id="sortSelect">
              <option value="latest">최신순</option>
              <option value="shorts">쇼츠감 높은 순</option>
              <option value="priority">중요도 순</option>
            </select>
          </div>
        </section>

        <section class="two-column">
          <section class="panel">
            <h2>최신기사</h2>
            <div id="latestList" class="stack-list"></div>
          </section>
          <section class="panel">
            <h2>쇼츠감 높은 기사</h2>
            <div id="shortsList" class="stack-list"></div>
          </section>
        </section>

        <section class="two-column">
          <section class="panel">
            <h2>약 관련 기사</h2>
            <div id="medicationList" class="stack-list"></div>
          </section>
          <section class="panel">
            <h2>건강 관련 기사</h2>
            <div id="healthList" class="stack-list"></div>
          </section>
        </section>

        <section class="two-column">
          <section class="panel">
            <h2>추천 기사</h2>
            <div id="featuredList" class="stack-list"></div>
          </section>
          <section class="panel">
            <h2>소스별 흐름</h2>
            <div id="sourceSummary" class="stack-list"></div>
          </section>
        </section>

        <section class="panel">
          <h2>전체 기사</h2>
          <div id="allList" class="stack-list"></div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>

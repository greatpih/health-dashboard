<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>부관 | 건강·약 트렌드 대시보드</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">부관 private dashboard</p>
        <h1>건강·약 트렌드 대시보드</h1>
        <p class="subtext">카테고리를 누르면 원하는 기사 목록만 보이게 정리한 화면</p>
      </div>
      <div class="status-card">
        <span>운영 소스 4개</span>
        <span>카테고리 탭 방식</span>
        <span>원문 바로가기</span>
      </div>
    </header>

    <main class="layout single-column">
      <aside class="sidebar compact-sidebar">
        <section class="panel">
          <h2>빠른 필터</h2>
          <div class="filter-group" id="sourceFilters"></div>
          <div class="filter-group" id="tagFilters"></div>
          <label class="checkbox-row">
            <input type="checkbox" id="shortsOnly" />
            <span>쇼츠감 8점 이상만 보기</span>
          </label>
        </section>
      </aside>

      <section class="content">
        <section class="hero panel">
          <div>
            <h2>카테고리</h2>
            <p>원하는 카테고리를 누르면 해당 기사 목록만 아래에 표시됨</p>
          </div>
          <div class="sort-row">
            <label for="sortSelect">정렬</label>
            <select id="sortSelect">
              <option value="latest">최신순</option>
              <option value="shorts">쇼츠감 높은 순</option>
              <option value="priority">중요도 순</option>
            </select>
          </div>
        </section>

        <section class="panel">
          <div id="categoryTabs" class="category-tabs"></div>
        </section>

        <section class="panel">
          <h2 id="activeCategoryTitle">최신기사</h2>
          <div id="activeCategoryList" class="stack-list"></div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
